server:
  port: 8084

spring:
  cloud:
    gateway:
      server:
        webmvc:
          routes:
            - id: user-service
              uri: http://localhost:8081
              predicates:
                - Path=/users, /users/**

            - id: book-service
              uri: http://localhost:8082
              predicates:
                - Path=/books, /books/**

            - id: issue-service
              uri: http://localhost:8083
              predicates:
                - Path=/issues/**
              filters:
                - RewritePath=/issues/?(?<segment>.*), /${segment}